services:
  lab-mysql:
    image: mysql:latest
    container_name: lab-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: rest_lab_db
      MYSQL_USER: labuser
      MYSQL_PASSWORD: labpass
    volumes:
      - mysql-data:/var/lib/mysql
    restart: no

volumes:
  mysql-data:
    driver: local